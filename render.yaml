services:
  - type: web
    name: mauworld-api
    runtime: node
    rootDir: mauworld-api
    buildCommand: npm install && npx playwright install chromium --only-shell
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: MAUWORLD_PUBLIC_BASE_URL
        sync: false
      - key: MAUWORLD_AGENT_LINK_SECRET
        sync: false
      - key: MAUWORLD_INTERNAL_CRON_SECRET
        sync: false
      - key: MAUWORLD_ONBOARDING_SECRET
        sync: false
      - key: MAUWORLD_SHARED_BROWSER_ALLOWED_HOSTS
        value: >-
          mauworld.onrender.com,wikipedia.org,www.wikipedia.org,en.wikipedia.org,
          youtube.com,www.youtube.com,m.youtube.com,youtu.be,music.youtube.com,studio.youtube.com,
          tiktok.com,www.tiktok.com,m.tiktok.com,
          instagram.com,www.instagram.com,
          facebook.com,www.facebook.com,m.facebook.com,fb.watch,
          x.com,www.x.com,twitter.com,www.twitter.com,
          reddit.com,www.reddit.com,old.reddit.com,
          linkedin.com,www.linkedin.com,
          threads.net,www.threads.net,
          snapchat.com,www.snapchat.com,story.snapchat.com,
          pinterest.com,www.pinterest.com,
          discord.com,www.discord.com,
          tumblr.com,www.tumblr.com,
          whatsapp.com,www.whatsapp.com,web.whatsapp.com,
          telegram.org,web.telegram.org,t.me,
          messenger.com,www.messenger.com,
          twitch.tv,www.twitch.tv,clips.twitch.tv,
          vimeo.com,www.vimeo.com,player.vimeo.com,
          dailymotion.com,www.dailymotion.com,
          bilibili.com,www.bilibili.com,
          weibo.com,www.weibo.com,
          netflix.com,www.netflix.com,
          hulu.com,www.hulu.com,
          disneyplus.com,www.disneyplus.com,
          primevideo.com,www.primevideo.com,
          max.com,www.max.com,hbomax.com,www.hbomax.com,
          peacocktv.com,www.peacocktv.com,
          paramountplus.com,www.paramountplus.com,
          crunchyroll.com,www.crunchyroll.com,
          rumble.com,www.rumble.com
      - key: MAUWORLD_SHARED_BROWSER_VIEWPORT_WIDTH
        sync: false
      - key: MAUWORLD_SHARED_BROWSER_VIEWPORT_HEIGHT
        sync: false
      - key: MAUWORLD_SHARED_BROWSER_FRAME_RATE
        sync: false
      - key: MAUWORLD_SHARED_BROWSER_JPEG_QUALITY
        sync: false
      - key: MAUWORLD_LIVEKIT_URL
        sync: false
      - key: MAUWORLD_LIVEKIT_API_KEY
        sync: false
      - key: MAUWORLD_LIVEKIT_API_SECRET
        sync: false
      - key: MAUWORLD_LIVEKIT_ROOM_PREFIX
        sync: false

  - type: static
    name: mauworld
    staticPublishPath: .
