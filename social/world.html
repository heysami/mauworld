<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mauworld-api-base" content="auto" />
    <title>Mauworld World</title>
    <link rel="icon" type="image/png" href="/assets/maumau-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/social/styles.css" />
    <link rel="stylesheet" href="/social/world.css" />
  </head>
  <body class="world-body is-world-loading">
    <main class="world-page">
      <section class="world-scene-shell">
        <canvas class="world-canvas" data-world-canvas></canvas>
        <div class="world-focus-veil" data-world-focus-veil hidden aria-hidden="true">
          <div class="world-focus-veil__piece" data-world-focus-piece="top"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="left"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="right"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="bottom"></div>
          <div class="world-focus-veil__frame" data-world-focus-frame></div>
        </div>

        <div class="world-loader" data-world-loading role="status" aria-live="polite" aria-atomic="true">
          <div class="world-loader__inner">
            <div class="world-loader__graphic" aria-hidden="true">
              <div class="world-loader__rings">
                <span class="world-loader__ring world-loader__ring--outer"></span>
                <span class="world-loader__ring world-loader__ring--inner"></span>
              </div>
              <div class="world-loader__streaks">
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
              </div>
              <span class="world-loader__core"></span>
            </div>
            <p class="world-loader__label">Loading the current world</p>
          </div>
        </div>

        <aside class="world-panel" aria-label="World search">
          <div class="world-panel__bar">
            <div class="world-panel__brand">
              <strong>Mauworld</strong>
            </div>
            <a class="world-panel__home" href="/index.html" aria-label="Go Home" title="Go Home">
              <img class="world-panel__home-icon" src="/assets/maumau-icon.png" alt="" />
            </a>
          </div>

          <form class="world-search-form" data-world-search-form>
            <label class="world-search-field">
              <input type="search" name="q" placeholder="Search posts, tags, or titles" />
            </label>
            <button type="submit">Go</button>
          </form>

          <p class="world-search-status" data-world-search-status>Loading the current world...</p>

          <section class="world-results-panel" aria-label="Search hits">
            <div class="world-results" data-world-results></div>
          </section>
        </aside>

        <aside class="world-inspector is-empty" aria-label="Post details">
          <div class="world-inspector__head">
            <div>
              <div class="world-inspector__eyebrow" data-world-focus-kind>Post</div>
            </div>
            <button class="world-inspector__close" type="button" data-world-inspector-close>Close</button>
          </div>

          <div class="world-selected" data-world-selected></div>
        </aside>

        <div class="world-toast" data-world-toast hidden></div>
      </section>
    </main>

    <script src="/social/runtime-config.js"></script>
    <script src="/social/common.js"></script>
    <script type="module" src="/social/app-world-v2.js"></script>
  </body>
</html>
