<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mauworld-api-base" content="auto" />
    <title>Mauworld World</title>
    <link rel="icon" type="image/png" href="/assets/maumau-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/social/styles.css" />
    <link rel="stylesheet" href="/social/world.css" />
  </head>
  <body class="world-body is-world-loading">
    <main class="world-page">
      <section class="world-scene-shell">
        <canvas class="world-canvas" data-world-canvas></canvas>
        <div class="world-focus-veil" data-world-focus-veil hidden aria-hidden="true">
          <div class="world-focus-veil__piece" data-world-focus-piece="top"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="left"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="right"></div>
          <div class="world-focus-veil__piece" data-world-focus-piece="bottom"></div>
          <div class="world-focus-veil__frame" data-world-focus-frame></div>
        </div>

        <div class="world-loader" data-world-loading role="status" aria-live="polite" aria-atomic="true">
          <div class="world-loader__inner">
            <div class="world-loader__graphic" aria-hidden="true">
              <div class="world-loader__rings">
                <span class="world-loader__ring world-loader__ring--outer"></span>
                <span class="world-loader__ring world-loader__ring--inner"></span>
              </div>
              <div class="world-loader__streaks">
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
                <span class="world-loader__streak"></span>
              </div>
              <span class="world-loader__core"></span>
            </div>
            <p class="world-loader__label">Loading the current world</p>
          </div>
        </div>

        <aside class="world-panel" aria-label="World search">
          <div class="world-panel__bar">
            <div class="world-panel__brand">
              <strong>Mauworld</strong>
            </div>
            <a class="world-panel__home" href="/index.html" aria-label="Go Home" title="Go Home">
              <img class="world-panel__home-icon" src="/assets/maumau-icon.png" alt="" />
            </a>
          </div>

          <form class="world-search-form" data-world-search-form>
            <label class="world-search-field">
              <input type="search" name="q" placeholder="Search posts, tags, or titles" />
            </label>
            <button type="submit">Go</button>
          </form>

          <p class="world-search-status" data-world-search-status>Loading the current world...</p>

          <section class="world-browser-panel" data-world-browser-panel aria-label="Nearby share">
            <div class="world-browser-panel__head">
              <strong>Nearby Share</strong>
              <div class="world-browser-panel__actions">
                <button type="button" class="is-muted" data-world-browser-expand aria-expanded="false">Focus</button>
                <button type="button" data-world-browser-launch>Share</button>
                <button type="button" class="is-muted" data-world-browser-stop>Stop</button>
              </div>
            </div>

            <div class="world-browser-share" data-world-browser-share>
              <label class="world-browser-share__field">
                <input
                  type="text"
                  maxlength="96"
                  data-world-browser-share-title
                  placeholder="Name this share"
                  autocomplete="off"
                  aria-label="Share title"
                />
              </label>
              <div class="world-browser-share__modes" aria-label="Share type">
                <button type="button" class="is-active" data-world-browser-share-mode="screen" aria-pressed="true">
                  Screen
                </button>
                <button type="button" data-world-browser-share-mode="camera" aria-pressed="false">Video</button>
                <button type="button" data-world-browser-share-mode="audio" aria-pressed="false">Voice</button>
              </div>
            </div>

            <div class="world-browser-summary" data-world-browser-summary>
              <div class="world-browser-summary__row">
                <span class="world-browser-summary__badge" data-world-browser-summary-badge data-state="idle">
                  Idle
                </span>
                <strong class="world-browser-summary__current" data-world-browser-summary-current>
                  Not sharing yet
                </strong>
              </div>
              <p class="world-browser-summary__hint" data-world-browser-summary-hint>
                Pick a type, add a title if you want, then press Share.
              </p>
            </div>

            <div class="world-browser-stage" data-world-browser-stage tabindex="0" aria-label="Nearby share preview">
              <video
                class="world-browser-stage__video"
                data-world-browser-video
                muted
                autoplay
                playsinline
                hidden
              ></video>
              <img class="world-browser-stage__frame" data-world-browser-frame alt="" hidden />
              <div class="world-browser-stage__placeholder" data-world-browser-placeholder>
                Share a screen, video, or voice nearby.
              </div>
              <button
                type="button"
                class="world-browser-stage__resume"
                data-world-browser-resume
                hidden
              >Start Stream</button>
            </div>

            <p class="world-browser-status world-browser-status--sr" data-world-browser-status aria-live="polite">
              Realtime share offline.
            </p>
          </section>
          <div data-world-browser-dock hidden></div>

          <section class="world-results-panel" aria-label="Search hits">
            <div class="world-results" data-world-results></div>
          </section>
        </aside>

        <div data-world-browser-overlay-root></div>
        <button
          class="world-browser-backdrop"
          type="button"
          data-world-browser-backdrop
          aria-label="Dismiss browser focus"
          aria-hidden="true"
        ></button>

        <aside class="world-inspector is-empty" aria-label="Post details">
          <div class="world-inspector__head">
            <div>
              <div class="world-inspector__eyebrow" data-world-focus-kind>Post</div>
            </div>
            <button class="world-inspector__close" type="button" data-world-inspector-close>Close</button>
          </div>

          <div class="world-selected" data-world-selected></div>
        </aside>

        <div class="world-toast" data-world-toast hidden></div>
        <form class="world-chat-composer" data-world-chat-composer hidden>
          <div class="world-chat-composer__prompt">/ say something nearby</div>
          <label class="world-chat-composer__field">
            <input
              type="text"
              maxlength="160"
              data-world-chat-input
              placeholder="Say something to nearby visitors"
              autocomplete="off"
            />
          </label>
          <div class="world-chat-composer__meta">
            <span data-world-chat-status>Enter to send. Esc to cancel.</span>
            <span data-world-chat-counter>0/160</span>
          </div>
        </form>
      </section>
    </main>

    <script src="/social/runtime-config.js"></script>
    <script src="/social/common.js"></script>
    <script type="module" src="/social/app-world.js"></script>
  </body>
</html>
