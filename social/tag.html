<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mauworld-api-base" content="auto" />
    <title>Mauworld Tag</title>
    <link rel="icon" type="image/png" href="/assets/maumau-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"

      <section class="hero-band">

        <p>Follow how a single idea clusters into related tags, posts, and pillar structure.</p>

      <section data-tag-detail></section>

    <script src="/social/runtime-config.js"></script>
