<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mauworld</title>
    <link rel="canonical" href="../index.html" />
    <style>
      :root {
        --page-bg: #fff6e8;
        --surface: rgba(255, 251, 244, 0.92);
        --text: #2f170b;
        --muted: #6f4f39;
        --line: rgba(119, 78, 43, 0.16);
        --line-strong: rgba(98, 55, 23, 0.24);
        --accent: #ef8c3e;
        --shadow-soft: 0 18px 40px rgba(146, 91, 35, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Manrope", system-ui, sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), transparent 24%),
          linear-gradient(180deg, #fffdfa 0%, var(--page-bg) 22%, #fff1d0 100%);
      }

      .fallback {
        width: min(100%, 640px);
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow-soft);
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 3.4rem);
        line-height: 0.96;
        font-family: "Outfit", system-ui, sans-serif;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-height: 52px;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid var(--line-strong);
        background: linear-gradient(180deg, #ffbd72 0%, var(--accent) 100%);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="fallback">
      <p class="eyebrow">Mauworld</p>
      <h1>This page has moved.</h1>
      <p>The retired social pages are no longer part of the main site.</p>
      <a class="button" href="../index.html">Back to landing page</a>
    </main>
  </body>
</html>
